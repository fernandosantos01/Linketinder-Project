plugins {
    id 'groovy'
    id 'application' // Opcional: use se o seu projeto for um app executável
}

group = 'com.linketinder'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
    google()
    gradlePluginPortal()
}

dependencies {
    // Esta é a forma correta de usar o groovy-all na versão 4+: como uma plataforma (BOM)
    implementation platform('org.apache.groovy:groovy-all:4.0.0')

    // Agora você adiciona o que realmente vai usar (sem precisar colocar a versão, pois o BOM já cuida disso)
    implementation 'org.apache.groovy:groovy'
    implementation 'org.apache.groovy:groovy-json' // útil para o Linketinder

    // Para o Spock, a mesma lógica:
    testImplementation platform('org.spockframework:spock-bom:2.3-groovy-4.0')
    testImplementation 'org.spockframework:spock-core'
}

// O Spock 2.0+ exige que o JUnit Platform execute os testes
test {
    useJUnitPlatform()
}