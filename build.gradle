plugins {
    id 'groovy'
    id 'application'
}
application {
    mainClass = 'domain.Linketinder'
}

run{
    standardInput = System.in
}

group = 'com.linketinder'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
    google()
    gradlePluginPortal()
}

dependencies {
    implementation 'org.apache.groovy:groovy:5.0.0'
    implementation 'org.apache.groovy:groovy-json:5.0.0'
    implementation 'org.postgresql:postgresql:42.7.2'

    testImplementation platform('org.spockframework:spock-bom:2.4-groovy-5.0')
    testImplementation 'org.spockframework:spock-core'
    testImplementation 'org.junit.platform:junit-platform-console-standalone:1.9.2'
    testImplementation 'net.bytebuddy:byte-buddy:1.14.10'
    testImplementation 'cglib:cglib-nodep:3.3.0'
}
test {
    useJUnitPlatform()
}